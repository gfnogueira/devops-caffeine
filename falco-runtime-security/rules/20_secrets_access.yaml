- rule: Read of sensitive secret file
  desc: A process opened a secret material file outside of expected administrative tooling.
  condition: >
    open_read
    and sensitive_secret_paths
    and not proc.name in (sshd, sudo, passwd, vipw, useradd, usermod, userdel)
  output: >
    Sensitive secret file read
    (user=%user.name proc=%proc.name cmd=%proc.cmdline file=%fd.name container=%container.id)
  priority: CRITICAL
  tags: [secrets, mitre_credential_access]

- rule: SSH authorized_keys modified
  desc: Detects modification of an authorized_keys file, common backdoor primitive.
  condition: >
    modify
    and (fd.name endswith /.ssh/authorized_keys)
  output: >
    SSH authorized_keys modified
    (user=%user.name proc=%proc.name cmd=%proc.cmdline file=%fd.name container=%container.id)
  priority: CRITICAL
  tags: [ssh, backdoor, mitre_persistence]
