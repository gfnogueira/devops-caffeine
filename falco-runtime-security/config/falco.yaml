rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/rules.d

engine:
  kind: modern_ebpf
  modern_ebpf:
    cpus_for_each_buffer: 2
    drop_failed_exit: true

load_plugins: []

watch_config_files: true

priority: debug

json_output: true
json_include_output_property: true
json_include_tags_property: true

log_stderr: true
log_syslog: false
log_level: info

outputs:
  rate: 0
  max_burst: 1000

stdout_output:
  enabled: true

file_output:
  enabled: true
  keep_alive: false
  filename: /var/log/falco/falco-events.log

http_output:
  enabled: true
  url: http://localhost:2801/
  user_agent: falcosecurity/falco
  insecure: true

grpc_output:
  enabled: false

syscall_event_drops:
  threshold: 0.1
  actions:
    - log
    - alert
  rate: 0.03333
  max_burst: 10

metadata_download:
  max_mb: 100
  chunk_wait_us: 1000
  watch_freq_sec: 1

base_syscalls:
  custom_set: []
  repair: false
